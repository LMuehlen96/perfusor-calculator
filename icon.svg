    <rect x="176" y="158" width="104" height="36" rx="8" fill="#eafff5"/>
    <rect x="176" y="158" width="42" height="36" rx="8" fill="#bff3dc"/>
    <rect x="158" y="149" width="16" height="54" rx="5" fill="#eafff5"/>
    <rect x="280" y="169" width="34" height="14" rx="5" fill="#eafff5"/>
    <rect x="314" y="174" width="26" height="4" rx="2" fill="#eafff5"/>
